<!DOCTYPE html>

<style>
        /* Developer-Centric Functionalism Base Styles */
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-surface');
            -webkit-font-smoothing: antialiased;
        }

        /* Abstract structural background for login */
        .bg-tech-pattern {
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(77, 142, 255, 0.03) 0%, transparent 60%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: center center;
        }

        .input-glass {
            background: theme('colors.surface-container-low');
            border: 1px solid theme('colors.outline-variant' / 30%);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            transition: all 0.2s ease-in-out;
        }

        .input-glass:focus-within {
            border-color: theme('colors.tertiary');
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 0 1px theme('colors.tertiary');
        }

        .btn-primary-gradient {
            background: linear-gradient(90deg, theme('colors.primary-container'), theme('colors.secondary-container'));
            border: 1px solid transparent;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        .btn-primary-gradient:hover {
            opacity: 0.9;
        }

        .btn-primary-gradient:active {
            transform: scale(0.98);
        }

        .glass-card {
            background: rgba(42, 42, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid theme('colors.outline-variant' / 20%);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-hidden bg-tech-pattern text-body-md font-body-md">
<!-- TopNavBar (Limited for Login) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-gutter max-w-container-max mx-auto h-[60px] bg-surface/80 backdrop-blur-md border-b border-outline-variant/10">
<div class="flex items-center gap-4">
<div class="font-display text-display bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary text-headline-md font-bold tracking-tight">WatchDog</div>
</div>
<div class="flex items-center gap-4">
<!-- Navigation suppressed for transactional page -->
<a class="text-on-surface-variant hover:text-primary transition-colors duration-200 font-label-caps text-label-caps flex items-center gap-2" href="#">
<span class="material-symbols-outlined" style="font-size: 18px;">help</span>
                Support
            </a>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-gutter mt-[60px] relative z-10">
<!-- Login/Register Card -->
<div class="glass-card w-full max-w-md rounded-xl p-stack-lg relative overflow-hidden">
<!-- Subtle gradient orb behind card content -->
<div class="absolute -top-32 -left-32 w-64 h-64 bg-primary-container rounded-full mix-blend-screen filter blur-[80px] opacity-20 pointer-events-none"></div>
<div class="relative z-10">
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-xs" id="form-title">Access Mission Control</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Log in to monitor your API infrastructure.</p>
</div>
<!-- Google OAuth Button -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-highest hover:bg-surface-variant border border-outline-variant/30 text-on-surface font-label-caps text-label-caps py-3 px-4 rounded-xl transition-colors duration-200 mb-stack-md">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
<!-- Divider -->
<div class="relative flex items-center py-stack-sm mb-stack-md">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink-0 mx-4 text-on-surface-variant font-code-md text-code-md uppercase tracking-wider text-[10px]">Or continue with email</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Form -->
<form class="space-y-stack-md" id="auth-form">
<!-- Register Only Field (Hidden by default) -->
<div class="hidden space-y-1" id="username-field">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="username">Username</label>
<div class="input-glass rounded-lg flex items-center px-3 py-2">
<span class="material-symbols-outlined text-outline-variant mr-2" style="font-size: 18px;">badge</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface font-code-md text-code-md w-full placeholder-outline-variant/50" id="username" placeholder="dev_operator" type="text"/>
</div>
</div>
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="email">Work Email</label>
<div class="input-glass rounded-lg flex items-center px-3 py-2">
<span class="material-symbols-outlined text-outline-variant mr-2" style="font-size: 18px;">mail</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface font-code-md text-code-md w-full placeholder-outline-variant/50" id="email" placeholder="sysadmin@company.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center ml-1">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:text-primary-fixed transition-colors" href="#" id="forgot-password-link">Forgot?</a>
</div>
<div class="input-glass rounded-lg flex items-center px-3 py-2">
<span class="material-symbols-outlined text-outline-variant mr-2" style="font-size: 18px;">key</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface font-code-md text-code-md w-full placeholder-outline-variant/50" id="password" placeholder="••••••••" type="password"/>
<button class="text-outline-variant hover:text-on-surface transition-colors ml-2 focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-size: 18px;">visibility_off</span>
</button>
</div>
</div>
<!-- Register Only Terms (Hidden by default) -->
<div class="hidden items-start mt-stack-md" id="terms-field">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant/50 bg-surface-container-low text-primary focus:ring-primary focus:ring-offset-surface" id="terms" type="checkbox"/>
</div>
<label class="ml-2 font-body-sm text-body-sm text-on-surface-variant" for="terms">
                            I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<button class="w-full btn-primary-gradient text-white font-label-caps text-label-caps py-3 rounded-lg shadow-lg mt-stack-lg flex items-center justify-center gap-2" id="submit-btn" type="submit">
<span class="material-symbols-outlined" style="font-size: 18px;">login</span>
                        Secure Login
                    </button>
</form>
<!-- Toggle Mode -->
<div class="mt-stack-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
<span id="toggle-text">Need an account?</span>
<button class="text-primary hover:text-primary-fixed font-bold ml-1 transition-colors focus:outline-none" id="toggle-mode-btn" type="button">
                            Register Node
                        </button>
</p>
</div>
</div>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('toggle-mode-btn');
            const formTitle = document.getElementById('form-title');
            const submitBtn = document.getElementById('submit-btn');
            const usernameField = document.getElementById('username-field');
            const termsField = document.getElementById('terms-field');
            const toggleText = document.getElementById('toggle-text');
            const forgotPasswordLink = document.getElementById('forgot-password-link');
            
            let isLogin = true;

            toggleBtn.addEventListener('click', () => {
                isLogin = !isLogin;
                
                if (isLogin) {
                    // Switch to Login
                    formTitle.textContent = 'Access Mission Control';
                    submitBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 18px;">login</span>Secure Login';
                    usernameField.classList.add('hidden');
                    termsField.classList.remove('flex');
                    termsField.classList.add('hidden');
                    toggleText.textContent = 'Need an account?';
                    toggleBtn.textContent = 'Register Node';
                    forgotPasswordLink.style.display = 'block';
                } else {
                    // Switch to Register
                    formTitle.textContent = 'Initialize New Node';
                    submitBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 18px;">person_add</span>Create Account';
                    usernameField.classList.remove('hidden');
                    termsField.classList.remove('hidden');
                    termsField.classList.add('flex');
                    toggleText.textContent = 'Already deployed?';
                    toggleBtn.textContent = 'Login Here';
                    forgotPasswordLink.style.display = 'none';
                }
            });

            // Password visibility toggle (visual only)
            const visibilityBtn = document.querySelector('button[type="button"] span.material-symbols-outlined');
            if(visibilityBtn) {
                visibilityBtn.parentElement.addEventListener('click', function() {
                    const input = document.getElementById('password');
                    if (input.type === 'password') {
                        input.type = 'text';
                        visibilityBtn.textContent = 'visibility';
                    } else {
                        input.type = 'password';
                        visibilityBtn.textContent = 'visibility_off';
                    }
                });
            }
        });
    </script>
</body></html>
